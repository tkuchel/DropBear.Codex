name: CI (.NET 10)

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch: # Allow manual triggering

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Validate Version Alignment
        shell: pwsh
        run: |
          Write-Host "Validating version alignment (Nerdbank.GitVersioning)..."
          ./validate-version-alignment.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Version validation failed! See output above for details."
            exit 1
          }

      - name: Restore
        run: dotnet restore --nologo

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore --nologo

      - name: Test + Coverage (Cobertura)
        shell: bash
        run: |
          dotnet test --configuration Release --no-build --nologo \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Publish Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@cf6fe1b38ed5becc89ffe056c1f240825993be5b # v5.5.4
        with:
          reports: "./TestResults/**/coverage.cobertura.xml"
          targetdir: "./TestResults/CoverageReport"
          reporttypes: "HtmlInline_AzurePipelines;Cobertura"

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.os }}
          path: ./TestResults/CoverageReport
          retention-days: 14

      - name: Collect Test Results
        if: always()
        shell: bash
        run: |
          mkdir -p TestResults/collected
          find . -type f -name "*.trx" ! -path "./TestResults/collected/*" -exec cp {} TestResults/collected \;

      - name: Annotate Test Results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: ".NET Tests (${{ matrix.os }})"
          path: "TestResults/collected/*.trx"
          reporter: dotnet-trx
          fail-on-error: false
